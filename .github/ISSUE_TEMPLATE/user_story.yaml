name: User Story
description: Capture a user-facing requirement from the user's perspective
title: "story: "
labels: ["user-story"]
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Describe the need from the user's perspective.
      placeholder: |
        As a <role>,
        I want <goal/capability>,
        so that <benefit/value>.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this story to be considered done?
      placeholder: |
        - [ ] (ex.) Given <context>, when <action>, then <outcome>
        - [ ] ...
    validations:
      required: true

  - type: input
    id: parent
    attributes:
      label: Parent Epic
      description: Link to the epic this story belongs to, if any.
      placeholder: "#123"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Mockups, constraints, dependencies, or anything else relevant.
    validations:
      required: false
