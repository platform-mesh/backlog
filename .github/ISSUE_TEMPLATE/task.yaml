name: Task
description: Create a new development task
title: "task: "
labels: ["task"]
body:
  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Details
      description: Technical implementation details including Go code and Kubernetes resources
      placeholder: |
        - Code changes:
        - Kubernetes resources:
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Completion Checklist
      options:
        - label: Code implemented and tested
        - label: Documentation updated
        - label: Changes reviewed
